<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Gradient definition -->
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF4B2B;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF416C;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background Hexagon -->
    <path d="M100 20 L170 60 L170 140 L100 180 L30 140 L30 60 Z"
          fill="none"
          stroke="url(#grad1)"
          stroke-width="8"
          stroke-linejoin="round" />

    <!-- Stylized 'S' / Dynamic Line -->
    <path d="M70 70 C 130 50, 150 110, 100 110 C 50 110, 70 170, 130 150"
          fill="none"
          stroke="#333"
          stroke-width="12"
          stroke-linecap="round"
          stroke-linejoin="round" />

    <!-- Accent Dot -->
    <circle cx="130" cy="150" r="6" fill="url(#grad1)" />
</svg>
